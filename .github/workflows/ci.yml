name: ComplianceOS CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff black mypy pytest pytest-cov

      - name: Code Formatting Check (Black)
        run: black --check . --exclude "/(database/migrations|venv|\.git)/"

      - name: Lint Analysis (Ruff)
        run: ruff check . --ignore E501,F401,F841,E402,E712,RUF012 || true

      - name: Type Checking (Mypy)
        run: mypy --ignore-missing-imports . || true

      - name: Generate Development RSA Keys
        run: python scripts/generate_dev_keys.py

      - name: Execute Automated Test Suite
        run: python -m pytest test_main.py tests/ -vv --durations=20 --cov=. --cov-report=xml

      - name: Upload Test Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    needs: quality-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Container Image
        run: docker build -t complianceos-web:latest .
